        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative min-h-screen flex flex-col items-center justify-between py-16 px-8 bg-surface">
<!-- Architectural Breathing Zone Top -->
<div class="flex-1 w-full flex items-center justify-center">
<div class="flex flex-col items-center space-y-12">
<!-- Brand Logo & Identity -->
<div class="relative group">
<!-- Subtle Glow Backdrop -->
<div class="absolute -inset-8 bg-primary-container/5 blur-3xl rounded-full opacity-50"></div>
<div class="relative flex flex-col items-center">
<div class="w-32 h-32 md:w-40 md:h-40 flex items-center justify-center mb-8">
<img alt="My Office Days modern building logo" class="w-full h-full object-contain" data-alt="Modern architectural building icon with clean geometric lines in a vibrant blue tech style on a pure white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFevanh3qhirG49znoSHGjDM3siCD62fyoZ6qbeusdU8HLtSh3RL5AtTg4jsgwLgC_cKQtHjPTdVDtTiNWcgg1DXMge5-KAKoL8_4RCWIDG_-rtL64jONGxp03zQWqS7djvUM_EG6B-JvTsOx_ooB25cQxJKhPrldB5hlknRTxCT59Z5BVvB10_VTC1Ve3bmbTroFD3ybaUo8d4keCUs4084uc5ucc1yEX7QduG36SYoSmKrv7bqSiDfnAUfLZ7E18b1yLi0hV5_6e"/>
</div>
<h1 class="font-headline font-extrabold text-4xl md:text-5xl tracking-tight bg-gradient-to-br from-primary to-primary-container bg-clip-text text-transparent">
                            My Office Days
                        </h1>
<p class="mt-4 font-label text-sm tracking-[0.2em] text-on-surface-variant font-semibold uppercase">
                            Workspace Management
                        </p>
</div>
</div>
<!-- Interaction Hint / Loading State -->
<div class="flex items-center space-x-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse [animation-delay:200ms]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse [animation-delay:400ms]"></div>
</div>
</div>
</div>
<!-- Footer Information: Architectural Ledger Style -->
<div class="w-full max-w-md space-y-8 text-center">
<!-- Security Badge Container -->
<div class="inline-flex items-center px-5 py-2.5 rounded-full bg-surface-container-low text-on-secondary-container">
<span class="material-symbols-outlined text-[20px] mr-2" style="font-variation-settings: 'FILL' 1;">
                    shield_lock
                </span>
<span class="font-label text-xs font-semibold tracking-wide">
                    Data is secure and stored locally
                </span>
</div>
<!-- Versioning & System Info -->
<div class="flex flex-col items-center space-y-2">
<div class="w-8 h-[1px] bg-outline-variant/30 mb-2"></div>
<div class="flex items-center space-x-4">
<span class="font-label text-[10px] text-on-surface-variant/60 tracking-widest uppercase font-bold">
                        v2.4.0-STABLE
                    </span>
</div>
</div>
</div>
<!-- Background Tonal Shifts (Architectural Planes) -->
<div class="absolute top-0 right-0 w-1/3 h-1/3 bg-surface-container-low/40 rounded-bl-[120px] -z-10"></div>
<div class="absolute bottom-0 left-0 w-1/4 h-1/4 bg-surface-container/30 rounded-tr-[80px] -z-10"></div>
</main>
<!-- Suppressed Navigation Shell for Focused Task (Splash Screen) -->
<!-- Rule: The Splash Screen is a task-focused entry point, so global navigation is suppressed. -->
